<!DOCTYPE html>
<html>
    <head>
        <title>Paste to Markdown</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="utf-8">
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <link href="favicon.ico" rel="icon" type="image/x-icon">
        <link rel="stylesheet" href="assets/bootstrap.css">
        <script type="module" src="/clipboard2markdown.js"></script>
        <style>
            h2 {
                font-size: 22px;
                font-style: italic;
            }
            body {
                background-attachment: fixed;
                background-image: url('background.svg');
                background-position: right 10% bottom 20%;
                background-repeat: no-repeat;
                background-size: 20em;
                margin-bottom: 10vh;
                margin-top: 10vh;
            }
            #info {
                margin-bottom: 12px;
            }
            #info p {
                margin-bottom: 8px;
            }
            #info ul {
                margin: 0 0 8px 18px;
            }
            #pastebin {
                background: #fff;
                border: 1px dashed #9aa4af;
                border-radius: 8px;
                margin-bottom: 12px;
                min-height: 110px;
                overflow: auto;
                padding: 10px 12px;
                width: 100%;
            }
            #pastebin:focus {
                border-color: #1f6feb;
                box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.18);
                outline: none;
            }
            #pastebin:empty:before {
                color: #66707a;
                content: attr(data-placeholder);
            }
            .action-bar {
                align-items: center;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 10px;
            }
            .action-btn {
                cursor: pointer;
                font-size: 12px;
                padding: 4px 8px;
            }
            #copy-status {
                color: #666;
                font-size: 12px;
                min-height: 18px;
            }
            #output {
                border: none;
                background: transparent;
                font-family: Consolas, "Liberation Mono", Courier, monospace;
                font-size: 13px;
                line-height: 19px;
                min-height: 78vh;
                overflow: auto;
                padding: 6px 10px;
                resize: none;
                width: 100%;
            }
            #preview-panel {
                border: 1px solid #d8dde3;
                border-radius: 8px;
                min-height: 62vh;
                overflow: hidden;
            }
            .preview-tabs {
                background: #f4f6f8;
                border-bottom: 1px solid #d8dde3;
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                padding: 8px;
            }
            .preview-tab {
                background: #fff;
                border: 1px solid #c9d2db;
                border-radius: 6px;
                cursor: pointer;
                font-size: 12px;
                padding: 6px 10px;
            }
            .preview-tab.active {
                background: #1f6feb;
                border-color: #1f6feb;
                color: #fff;
            }
            .preview-pane {
                display: none;
                max-height: 60vh;
                min-height: 60vh;
                overflow: auto;
                padding: 14px;
            }
            .preview-pane.active {
                display: block;
            }
            #preview-input-frame {
                background: #fff;
                border: 1px solid #d8dde3;
                border-radius: 6px;
                height: 100%;
                min-height: 56vh;
                width: 100%;
            }
            #preview-raw-code {
                background: #f6f8fa;
                border: 1px solid #d8dde3;
                border-radius: 6px;
                display: block;
                font-family: Consolas, "Liberation Mono", Courier, monospace;
                font-size: 12px;
                line-height: 1.4;
                margin: 0;
                overflow-x: auto;
                padding: 12px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            #markdown-preview {
                font-size: 14px;
                line-height: 1.6;
            }
            #markdown-preview table {
                border-collapse: collapse;
                margin: 10px 0;
                width: 100%;
            }
            #markdown-preview th,
            #markdown-preview td {
                border: 1px solid #d0d7de;
                padding: 6px 8px;
                vertical-align: top;
            }
            #markdown-preview pre {
                background: #f6f8fa;
                border: 1px solid #d8dde3;
                border-radius: 6px;
                overflow: auto;
                padding: 10px;
            }
            #markdown-preview code {
                background: #f0f3f6;
                border-radius: 3px;
                padding: 1px 4px;
            }
            #markdown-preview pre code {
                background: transparent;
                padding: 0;
            }
            #markdown-preview .mermaid {
                border: 1px solid #d8dde3;
                border-radius: 6px;
                margin: 10px 0;
                overflow-x: auto;
                padding: 10px;
            }
            #markdown-preview .mermaid svg {
                height: auto;
                max-width: 100%;
            }
            #wrapper.preview-mode #output {
                display: none;
            }
            @media (max-width: 900px) {
                #output {
                    min-height: 50vh;
                }
                #preview-panel {
                    min-height: 50vh;
                }
                .preview-pane {
                    max-height: 48vh;
                    min-height: 48vh;
                }
                #preview-input-frame {
                    min-height: 44vh;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <section id="info">
                <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
                    <h1 style="margin-bottom: 8px;">Paste to Markdown</h1>
                    <a href="https://github.com/luutuankiet/clipboard2markdown" target="_blank" style="text-decoration: none; font-weight: bold; margin-bottom: 8px;">
                        <svg height="16" viewBox="0 0 16 16" width="16" style="vertical-align: text-bottom; fill: currentColor; margin-right: 4px;"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>Fork me on GitHub
                    </a>
                </div>
                <p>Convert rich text from <strong>Jira, Confluence, Slack</strong>, and more into clean, AI-ready Markdown.</p>
                <ul>
                    <li><strong>Desktop:</strong> <code>Ctrl+V</code> or <code>&#8984;+V</code></li>
                    <li><strong>Mobile:</strong> Tap the box below, long-press, and choose Paste</li>
                </ul>
                <p><small>Runs 100% locally in your browser using <a href="https://github.com/mixmark-io/turndown" target="_blank">Turndown</a>. No data is sent to any server.</small></p>
            </section>
            <div contenteditable="true" data-placeholder="Tap here, then paste your copied content" id="pastebin"></div>
            <section id="wrapper">
                <div class="action-bar">
                    <button class="action-btn" id="toggle-input-btn">📥 Hide Input Box</button>
                    <button class="action-btn" id="copy-html-btn">📋 Copy Raw HTML</button>
                    <button class="action-btn" id="copy-md-btn">📝 Copy Converted Markdown</button>
                    <button class="action-btn" id="toggle-preview-btn">👀 Show Preview</button>
                    <span id="copy-status"></span>
                </div>

                <textarea id="output"></textarea>

                <section class="hidden" id="preview-panel">
                    <div class="preview-tabs">
                        <button class="preview-tab active" data-view="input" type="button">📥 Input</button>
                        <button class="preview-tab" data-view="raw" type="button">🧾 Raw HTML</button>
                        <button class="preview-tab" data-view="markdown" type="button">📝 Markdown Preview</button>
                    </div>
                    <div class="preview-pane active" id="preview-pane-input">
                        <iframe id="preview-input-frame" sandbox=""></iframe>
                    </div>
                    <div class="preview-pane" id="preview-pane-raw">
                        <pre><code id="preview-raw-code"></code></pre>
                    </div>
                    <div class="preview-pane" id="preview-pane-markdown">
                        <article id="markdown-preview"></article>
                    </div>
                </section>
            </section>
        </div>
    </body>
</html>
